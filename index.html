<!DOCTYPE html>
<html lang="en">
<head>
  <!-- This tells the browser to use normal text characters correctly -->
  <meta charset="UTF-8">

  <!-- This makes the website fit properly on phones, tablets, and computers -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- This is the title that appears on the browser tab -->
  <title>Sheha's Math Buster</title>

  <!-- This connects the HTML file to the CSS styling file -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- This section creates the falling number and operator symbols in the background -->
  <div class="rain-background">
    <span>7</span>
    <span>+</span>
    <span>3</span>
    <span>x</span>
    <span>9</span>
    <span>-</span>
    <span>5</span>
    <span>/</span>
    <span>2</span>
    <span>=</span>
    <span>4</span>
    <span>*</span>
    <span>1</span>
    <span>8</span>
    <span>6</span>
    <span>0</span>
    <span>÷</span>
    <span>+</span>
    <span>9</span>
    <span>-</span>
    <span>3</span>
    <span>x</span>
    <span>5</span>
    <span>=</span>
    <span>7</span>
    <span>/</span>
    <span>2</span>
    <span>4</span>
    <span>+</span>
    <span>8</span>
    <span>0</span>
    <span>*</span>
    <span>6</span>
    <span>-</span>
    <span>1</span>
    <span>=</span>
  </div>

  <!-- This main container holds the whole calculator -->
  <main class="calculator-wrapper">

    <!-- This is the top part of the calculator with the title and GO!GO! section -->
    <header class="calculator-top">

      <!-- Calculator name -->
      <h1>Sheha's Math Buster</h1>

      <!-- This area contains the small numbers, GO!GO!, toggle design, and cat icon -->
      <div class="theme-area">

        <!-- These are decorative numbers above the toggle -->
        <div class="theme-numbers">
          <span>1</span>
          <span>2</span>
          <span>3</span>
        </div>

        <!-- This row holds the GO!GO! text, toggle, and cat icon -->
        <div class="theme-row">
          <p>GO!GO!</p>

          <!-- This is only a decorative toggle switch -->
          <div class="theme-toggle">
            <span></span>
          </div>

          <!-- This is the cat icon next to GO!GO! -->
          <div class="cat-icon">🐱</div>
        </div>
      </div>
    </header>

    <!-- This is the calculator screen where numbers and answers are displayed -->
    <section class="calculator-screen" id="display">
      0
    </section>

    <!-- This section contains all the calculator buttons -->
    <section class="calculator-buttons">

      <!-- First row of buttons -->
      <button class="btn number" data-value="7">7</button>
      <button class="btn number" data-value="8">8</button>
      <button class="btn number" data-value="9">9</button>
      <button class="btn action" id="delete">DEL</button>

      <!-- Second row of buttons -->
      <button class="btn number" data-value="4">4</button>
      <button class="btn number" data-value="5">5</button>
      <button class="btn number" data-value="6">6</button>
      <button class="btn operator" data-value="+">+</button>

      <!-- Third row of buttons -->
      <button class="btn number" data-value="1">1</button>
      <button class="btn number" data-value="2">2</button>
      <button class="btn number" data-value="3">3</button>
      <button class="btn operator" data-value="-">-</button>

      <!-- Fourth row of buttons -->
      <button class="btn number" data-value=".">.</button>
      <button class="btn number" data-value="0">0</button>
      <button class="btn operator" data-value="/">/</button>
      <button class="btn operator" data-value="*">x</button>

      <!-- Bottom row buttons -->
      <button class="btn reset" id="reset">RESET</button>
      <button class="btn equal" id="equal">=</button>

    </section>
  </main>

  <!-- This connects the HTML file to the JavaScript file -->
  <script src="js/script.js"></script>
</body>
</html>
